name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  elixir:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: obercloud_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      MIX_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost/obercloud_test
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "28"
      - uses: extractions/setup-just@v2
      - run: just mix-deps
      - run: cd server && mix compile --warnings-as-errors
      - run: just db-create db-migrate
      - run: just mix-test

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: extractions/setup-just@v2
      - run: cd cli && cargo fmt --check
      - run: just cargo-clippy
      - run: just cargo-test
      - run: just cargo-release
